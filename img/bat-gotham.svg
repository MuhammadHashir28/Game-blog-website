<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Gotham bat backdrop</title>
  <desc id="desc">A dark Gotham skyline with a bat silhouette and soft fog for background use.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
